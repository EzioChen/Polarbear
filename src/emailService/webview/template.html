<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>邮件编辑器</title>
  <style>
    :root {
      --bg-color: var(--vscode-editor-background, #1e1e1e);
      --fg-color: var(--vscode-foreground, #cccccc);
      --border-color: var(--vscode-panel-border, #333333);
      --input-bg: var(--vscode-input-background, #3c3c3c);
      --input-fg: var(--vscode-input-foreground, #cccccc);
      --input-border: var(--vscode-input-border, #555555);
      --btn-bg: var(--vscode-button-background, #0078d4);
      --btn-fg: var(--vscode-button-foreground, #ffffff);
      --btn-hover: var(--vscode-button-hoverBackground, #026ec1);
      --btn-secondary-bg: var(--vscode-button-secondaryBackground, #3a3d41);
      --btn-secondary-fg: var(--vscode-button-secondaryForeground, #cccccc);
      --text-secondary: var(--vscode-descriptionForeground, #969696);
      --focus-border: var(--vscode-focusBorder, #007fd4);
      --toolbar-hover: var(--vscode-toolbar-hoverBackground, #2a2d2e);
      --error-color: var(--vscode-testing-iconFailed, #f14c4c);
      --success-color: var(--vscode-testing-iconPassed, #73c991);
      --warning-color: var(--vscode-editorWarning-foreground, #cca700);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-color); color: var(--fg-color);
      height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    }
    .header {
      padding: 12px 16px; border-bottom: 1px solid var(--border-color);
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-title { font-size: 14px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }
    .field-row {
      display: flex; align-items: center; padding: 6px 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .field-label {
      width: 60px; font-size: 12px; color: var(--text-secondary);
      text-align: right; padding-right: 12px; flex-shrink: 0;
    }
    .field-input {
      flex: 1; background: var(--input-bg); color: var(--input-fg);
      border: 1px solid var(--input-border); padding: 4px 8px;
      font-size: 13px; border-radius: 2px; outline: none;
    }
    .field-input:focus { border-color: var(--focus-border); }
    .field-input::placeholder { color: var(--text-secondary); }
    .toolbar {
      display: flex; align-items: center; gap: 2px;
      padding: 4px 16px; border-bottom: 1px solid var(--border-color);
      background: var(--bg-color);
    }
    .toolbar-btn {
      width: 28px; height: 28px; border: none; background: transparent;
      color: var(--fg-color); border-radius: 3px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }
    .toolbar-btn:hover { background: var(--toolbar-hover); }
    .toolbar-separator { width: 1px; height: 20px; background: var(--border-color); margin: 0 4px; }
    .toolbar-spacer { flex: 1; }
    .toolbar-text { font-size: 12px; color: var(--text-secondary); }
    .editor-container { flex: 1; display: flex; overflow: hidden; }
    .editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }
    .preview-pane { flex: 1; display: flex; flex-direction: column; }
    .pane-header {
      padding: 4px 12px; font-size: 11px; color: var(--text-secondary);
      text-transform: uppercase; border-bottom: 1px solid var(--border-color);
      background: var(--bg-color);
    }
    #markdown-editor {
      flex: 1; width: 100%; padding: 12px 16px;
      font-family: var(--vscode-editor-font-family, 'Cascadia Code', 'Fira Code', monospace);
      font-size: 14px; line-height: 1.6; background: var(--bg-color);
      color: var(--fg-color); border: none; resize: none; outline: none;
    }
    #preview-content {
      flex: 1; padding: 12px 16px; overflow-y: auto; line-height: 1.6; font-size: 14px;
    }
    #preview-content h1, #preview-content h2, #preview-content h3,
    #preview-content h4, #preview-content h5, #preview-content h6 {
      margin-top: 24px; margin-bottom: 16px; font-weight: 600;
    }
    #preview-content h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    #preview-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
    #preview-content h3 { font-size: 1.25em; }
    #preview-content p { margin-bottom: 16px; }
    #preview-content ul, #preview-content ol { padding-left: 24px; margin-bottom: 16px; }
    #preview-content li { margin-bottom: 4px; }
    #preview-content blockquote {
      border-left: 4px solid var(--focus-border); padding: 8px 16px;
      margin: 16px 0; background: var(--input-bg); color: var(--text-secondary);
    }
    #preview-content code {
      font-family: var(--vscode-editor-font-family, monospace);
      background: var(--input-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em;
    }
    #preview-content pre {
      background: var(--input-bg); padding: 16px; border-radius: 6px;
      overflow-x: auto; margin: 16px 0;
    }
    #preview-content pre code { background: none; padding: 0; border-radius: 0; }
    #preview-content table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    #preview-content th, #preview-content td {
      border: 1px solid var(--border-color); padding: 8px 12px; text-align: left;
    }
    #preview-content th { background: var(--input-bg); font-weight: 600; }
    #preview-content img { max-width: 100%; }
    #preview-content a { color: var(--focus-border); }
    #preview-content hr { border: none; border-top: 1px solid var(--border-color); margin: 24px 0; }
    .footer { border-top: 1px solid var(--border-color); padding: 8px 16px; }
    .attachments-area { margin-bottom: 8px; }
    .attachment-item {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: var(--input-bg); border-radius: 4px;
      margin-right: 6px; margin-bottom: 4px; font-size: 12px;
    }
    .attachment-name { font-size: 12px; }
    .attachment-size { font-size: 11px; color: var(--text-secondary); }
    .attachment-remove { cursor: pointer; color: var(--text-secondary); font-size: 14px; line-height: 1; }
    .attachment-remove:hover { color: var(--error-color); }
    .add-attachment-btn {
      font-size: 12px; color: var(--focus-border); cursor: pointer;
      background: none; border: 1px dashed var(--border-color);
      padding: 4px 12px; border-radius: 4px;
    }
    .add-attachment-btn:hover { border-color: var(--focus-border); }
    .actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 6px 16px; border: none; border-radius: 3px; font-size: 13px; cursor: pointer; }
    .btn-primary { background: var(--btn-bg); color: var(--btn-fg); }
    .btn-primary:hover { background: var(--btn-hover); }
    .btn-secondary { background: transparent; color: var(--fg-color); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--toolbar-hover); }
    .btn-danger { background: var(--error-color); color: white; }
    .btn-danger:hover { opacity: 0.9; }
    .status-text { font-size: 11px; color: var(--text-secondary); margin-left: auto; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">&#x1F4E7; 撰写邮件</div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
      <button class="btn btn-primary" onclick="sendEmail()">发送</button>
    </div>
  </div>

  <div class="field-row">
    <div class="field-label">收件人</div>
    <input class="field-input" id="to-input" type="text" placeholder="收件人邮箱（多个用分号隔开）" />
  </div>
  <div class="field-row">
    <div class="field-label">抄送</div>
    <input class="field-input" id="cc-input" type="text" placeholder="抄送（可选）" />
  </div>
  <div class="field-row">
    <div class="field-label">密送</div>
    <input class="field-input" id="bcc-input" type="text" placeholder="密送（可选）" />
  </div>
  <div class="field-row">
    <div class="field-label">主题</div>
    <input class="field-input" id="subject-input" type="text" placeholder="邮件主题" />
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" title="粗体" onclick="insertMarkdown('**','**')"><b>B</b></button>
    <button class="toolbar-btn" title="斜体" onclick="insertMarkdown('*','*')"><i>I</i></button>
    <button class="toolbar-btn" title="标题" onclick="insertMarkdown('## ','')">H</button>
    <div class="toolbar-separator"></div>
    <button class="toolbar-btn" title="引用" onclick="insertMarkdown('&gt; ','')">"</button>
    <button class="toolbar-btn" title="无序列表" onclick="insertMarkdown('- ','')">&bull;</button>
    <button class="toolbar-btn" title="有序列表" onclick="insertMarkdown('1. ','')">1.</button>
    <div class="toolbar-separator"></div>
    <button class="toolbar-btn" title="链接" onclick="insertLink()">&#x1F517;</button>
    <button class="toolbar-btn" title="代码块" onclick="insertMarkdown('```\n','\n```')">&lt;/&gt;</button>
    <div class="toolbar-separator"></div>
    <button class="toolbar-btn" title="预览切换" onclick="togglePreview()">&#x1F441;</button>
    <div class="toolbar-spacer"></div>
    <span class="toolbar-text" id="word-count">0 字</span>
  </div>

  <div class="editor-container">
    <div class="editor-pane" id="editor-pane">
      <div class="pane-header">Markdown 编辑</div>
      <textarea id="markdown-editor" placeholder="请输入邮件内容（支持 Markdown 语法）&#10;&#10;## 标题&#10;&#10;正文内容..."></textarea>
    </div>
    <div class="preview-pane" id="preview-pane">
      <div class="pane-header">预览</div>
      <div id="preview-content"></div>
    </div>
  </div>

  <div class="footer">
    <div class="attachments-area" id="attachments-area">
      <button class="add-attachment-btn" onclick="addAttachment()">+ 添加附件</button>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="sendEmail()">&#x1F4E4; 发送邮件</button>
      <button class="btn btn-secondary" onclick="saveDraft()">&#x1F4BE; 保存草稿</button>
      <button class="btn btn-secondary" onclick="clearEditor()">&#x1F5D1; 清空</button>
      <span class="status-text" id="status-text"></span>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const editor = document.getElementById('markdown-editor');
    const previewContent = document.getElementById('preview-content');
    const wordCount = document.getElementById('word-count');
    let previewVisible = true;

    // Markdown parser
    function parseMarkdown(md) {
      if (!md) return '';
      let html = md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^##### (.*$)/gm, '<h5>$1</h5>')
        .replace(/^#### (.*$)/gm, '<h4>$1</h4>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/___(.*?)___/g, '<strong><em>$1</em></strong>')
        .replace(/__(.*?)__/g, '<strong>$1</strong>')
        .replace(/_(.*?)_/g, '<em>$1</em>')
        .replace(/~~(.*?)~~/g, '<del>$1</del>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />')
        .replace(/\[([^\]]*)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^\*\*\*$/gm, '<hr>')
        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/^\* (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

      // Wrap paragraphs
      html = html.replace(/^(?!<)(.+)$/gm, '<p>$1</p>');
      html = html.replace(/<p><\/p>/g, '');
      return html;
    }

    // Preview update with debounce
    let previewTimeout;
    function updatePreview() {
      clearTimeout(previewTimeout);
      previewTimeout = setTimeout(() => {
        const text = editor.value;
        previewContent.innerHTML = parseMarkdown(text);
        const count = text.replace(/\s/g, '').length;
        wordCount.textContent = count + ' 字';
      }, 300);
    }

    editor.addEventListener('input', updatePreview);

    // Sync scroll
    editor.addEventListener('scroll', function() {
      const maxScroll = this.scrollHeight - this.clientHeight;
      const previewMax = previewContent.parentElement.scrollHeight - previewContent.parentElement.clientHeight;
      if (maxScroll > 0 && previewMax > 0) {
        previewContent.parentElement.scrollTop = (this.scrollTop / maxScroll) * previewMax;
      }
    });

    // Markdown insertion
    function insertMarkdown(before, after) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const selected = text.substring(start, end);
      editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
      editor.focus();
      if (selected) {
        editor.selectionStart = start + before.length;
        editor.selectionEnd = start + before.length + selected.length;
      } else {
        editor.selectionStart = start + before.length;
        editor.selectionEnd = start + before.length;
      }
      updatePreview();
    }

    function insertLink() {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const selected = text.substring(start, end) || '链接文字';
      const linkText = '[' + selected + '](url)';
      editor.value = text.substring(0, start) + linkText + text.substring(end);
      editor.focus();
      editor.selectionStart = start + linkText.length;
      editor.selectionEnd = start + linkText.length;
      updatePreview();
    }

    function togglePreview() {
      previewVisible = !previewVisible;
      document.getElementById('preview-pane').style.display = previewVisible ? 'flex' : 'none';
    }

    // Keyboard shortcuts
    editor.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); insertMarkdown('**','**'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'i') { e.preventDefault(); insertMarkdown('*','*'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); insertLink(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendEmail(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); }
    });

    // Send email
    function sendEmail() {
      document.getElementById('status-text').textContent = '正在发送...';
      vscode.postMessage({
        type: 'sendEmail',
        data: {
          to: document.getElementById('to-input').value,
          cc: document.getElementById('cc-input').value,
          bcc: document.getElementById('bcc-input').value,
          subject: document.getElementById('subject-input').value,
          markdown: editor.value
        }
      });
    }

    function saveDraft() {
      vscode.postMessage({
        type: 'saveDraft',
        data: {
          to: document.getElementById('to-input').value,
          cc: document.getElementById('cc-input').value,
          bcc: document.getElementById('bcc-input').value,
          subject: document.getElementById('subject-input').value,
          markdown: editor.value
        }
      });
    }

    function addAttachment() {
      vscode.postMessage({ type: 'addAttachment' });
    }

    function removeAttachment(id) {
      vscode.postMessage({ type: 'removeAttachment', data: { id: id } });
    }

    function clearEditor() {
      if (confirm('确定要清空所有内容吗？')) {
        editor.value = '';
        document.getElementById('to-input').value = '';
        document.getElementById('cc-input').value = '';
        document.getElementById('bcc-input').value = '';
        document.getElementById('subject-input').value = '';
        document.getElementById('status-text').textContent = '已清空';
        updatePreview();
      }
    }

    // Message handler
    window.addEventListener('message', function(event) {
      const msg = event.data;
      switch (msg.type) {
        case 'loadDraft':
          if (msg.data.to) document.getElementById('to-input').value = msg.data.to;
          if (msg.data.cc) document.getElementById('cc-input').value = msg.data.cc;
          if (msg.data.bcc) document.getElementById('bcc-input').value = msg.data.bcc;
          if (msg.data.subject) document.getElementById('subject-input').value = msg.data.subject;
          if (msg.data.markdown) editor.value = msg.data.markdown;
          if (msg.data.attachments) renderAttachments(msg.data.attachments);
          document.getElementById('status-text').textContent = '草稿已恢复';
          updatePreview();
          break;
        case 'attachmentsUpdated':
          renderAttachments(msg.data.attachments);
          break;
        case 'draftSaved':
          document.getElementById('status-text').textContent = '草稿已保存';
          break;
      }
    });

    function renderAttachments(attachments) {
      const area = document.getElementById('attachments-area');
      const addBtn = area.querySelector('.add-attachment-btn');
      area.querySelectorAll('.attachment-item').forEach(function(el) { el.remove(); });
      if (attachments && attachments.length > 0) {
        attachments.forEach(function(att) {
          var div = document.createElement('span');
          div.className = 'attachment-item';
          div.innerHTML = '<span class="attachment-name">' + att.filename + '</span>' +
            '<span class="attachment-size">' + formatSize(att.size) + '</span>' +
            '<span class="attachment-remove" onclick="removeAttachment(\'' + att.id + '\')">&times;</span>';
          area.insertBefore(div, addBtn);
        });
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    updatePreview();
    vscode.postMessage({ type: 'editorReady' });
  </script>
</body>
</html>
